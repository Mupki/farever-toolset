<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farever Log Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#0f1215;--dark:#161b22;--dark2:#1c2330;--dark3:#222d3b;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.13);--bd3:rgba(255,255,255,.22);
  --teal:#1a9dbf;--teal2:#0e6a83;--teal3:rgba(26,157,191,.14);--teal-lt:#a8dff0;--teal-dk:#0a2e3a;
  --gold:#c8991a;--gold2:rgba(200,153,26,.13);--gold-lt:#f5d87a;
  --coral:#e05540;--coral2:rgba(224,85,64,.13);
  --green:#3dab5c;--green2:rgba(61,171,92,.13);
  --purple:#9b59d0;--purple2:rgba(155,89,208,.13);
  --red:#c94040;--blue:#3a7bd5;
  --cls-w:#c4914a;--cls-m:#4ab8d4;--cls-r:#d4c234;--cls-p:#e0e0e0;
  --text:#ddd8d0;--text2:#8a8a8a;--text3:#484848;
  --font-d:"Cinzel",serif;--font-b:"Crimson Pro",serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--void);color:var(--text);font-family:var(--font-b);font-size:14px;line-height:1.4}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
.app{display:flex;flex-direction:column;height:100vh}

/* ── TOPBAR ── */
.topbar{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;
  padding:0 14px;height:44px;background:var(--teal-dk);border-bottom:2px solid var(--teal2);flex-shrink:0}
.logo{font-family:var(--font-d);font-size:15px;font-weight:700;color:#fff;letter-spacing:.07em;white-space:nowrap}
.logo em{color:var(--teal-lt);font-style:normal;font-weight:400;font-size:11px;margin-left:5px}
.top-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap;overflow:hidden}
.badge{font-size:11px;padding:2px 8px;border-radius:3px;white-space:nowrap;
  background:rgba(26,157,191,.18);border:1px solid var(--teal2);color:var(--teal-lt)}
.top-actions{display:flex;gap:6px;align-items:center}
.topbtn{padding:4px 11px;border-radius:4px;border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.05);color:#ccc;font-size:12px;cursor:pointer;transition:all .12s;white-space:nowrap}
.topbtn:hover{background:rgba(255,255,255,.12);color:#fff}
.topbtn.danger{border-color:rgba(224,85,64,.4);color:rgba(224,85,64,.75)}
.topbtn.danger:hover{background:rgba(224,85,64,.1)}
input[type=file]{display:none}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:262px 1fr;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{background:var(--dark);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.sb-top{padding:8px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.sb-row{display:flex;gap:5px}
.sb-row input,.sb-row select{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--bd2);
  color:var(--text);font-size:12px;padding:5px 7px;border-radius:4px;outline:none;min-width:0}
.sb-row input::placeholder{color:var(--text3)}
.sb-row input:focus,.sb-row select:focus{border-color:var(--teal)}
.sb-row select option{background:#1c2330}
.sb-plrs{display:flex;gap:4px;flex-wrap:wrap;padding:2px 0}
/* Player buttons */
.plr-btn{padding:3px 8px;border-radius:3px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:rgba(255,255,255,.45);font-size:11px;font-weight:700;
  cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:3px}
.plr-btn:hover{border-color:rgba(255,255,255,.28);color:#ddd}
.plr-btn.active{color:#000!important}
.plr-btn.cls-w{border-color:var(--cls-w)}.plr-btn.cls-w.active{background:var(--cls-w)!important;border-color:var(--cls-w)!important}
.plr-btn.cls-m{border-color:var(--cls-m)}.plr-btn.cls-m.active{background:var(--cls-m)!important;border-color:var(--cls-m)!important}
.plr-btn.cls-r{border-color:var(--cls-r)}.plr-btn.cls-r.active{background:var(--cls-r)!important;border-color:var(--cls-r)!important}
.plr-btn.cls-p{border-color:rgba(200,200,200,.4)}.plr-btn.cls-p.active{background:var(--cls-p)!important;border-color:var(--cls-p)!important}
.plr-star{color:var(--gold);font-size:10px}
/* Fight list */
.fight-scroll{flex:1;overflow-y:auto}
.sess-hdr{display:flex;align-items:center;gap:6px;padding:6px 10px;cursor:pointer;
  background:rgba(26,157,191,.08);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:2;transition:background .12s}
.sess-hdr:hover{background:rgba(26,157,191,.14)}
.sess-arrow{font-size:9px;color:var(--teal-lt);transition:transform .15s;flex-shrink:0}
.sess-hdr.col .sess-arrow{transform:rotate(-90deg)}
.sess-lbl{font-family:var(--font-d);font-size:10px;font-weight:700;color:var(--teal-lt);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sess-cnt{font-size:10px;color:var(--text3);flex-shrink:0}
.sess-sum{padding:4px 10px 7px;background:rgba(0,0,0,.14);border-bottom:1px solid rgba(255,255,255,.03)}
.ss-r{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);padding:1px 0}
.ss-r span{color:rgba(255,255,255,.6)}.ss-r .you{color:var(--gold)}
.o-clear{font-size:9px;padding:0 5px;border-radius:2px;margin-left:4px;font-weight:700;background:rgba(61,171,92,.18);color:var(--green)}
.o-wipe{font-size:9px;padding:0 5px;border-radius:2px;margin-left:4px;font-weight:700;background:rgba(224,85,64,.13);color:var(--coral)}
.fi{padding:6px 10px 5px;cursor:pointer;border-left:3px solid transparent;
  border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s}
.fi:hover{background:rgba(255,255,255,.03)}
.fi.act{background:rgba(26,157,191,.09);border-left-color:var(--teal)}
.fi.you{border-left-color:rgba(200,153,26,.38)}
.fi.act.you{border-left-color:var(--gold)}
.fi.boss{border-left-color:rgba(224,85,64,.45)!important}
.fi.act.boss{border-left-color:var(--coral)!important}
.fi-top{display:flex;justify-content:space-between;align-items:baseline}
.fi-id{font-size:10px;color:var(--text3)}
.fi-dur{font-size:12px;font-weight:600}
.fi-btag{font-size:9px;padding:0 4px;border-radius:2px;background:rgba(224,85,64,.13);color:var(--coral);margin-left:3px}
.fi-nm{margin:2px 0 1px}
.fi-name{font-size:11px;font-weight:600;color:var(--text2,#cdd3e0)}
.fi-dmg{font-size:11px;color:rgba(255,255,255,.32);margin-top:1px}
.fi-who{font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-who.you{color:var(--gold-lt)}
.fi-clv{font-size:10px;color:var(--purple);margin-top:1px}

/* ── MAIN ── */
.main{overflow-y:auto;padding:14px 16px;background:var(--void)}
.dropzone{border:2px dashed rgba(255,255,255,.09);border-radius:8px;padding:48px 32px;
  text-align:center;color:var(--text3);cursor:pointer;transition:all .2s;margin-bottom:16px}
.dropzone:hover,.dropzone.over{border-color:var(--teal);color:var(--teal-lt);background:rgba(26,157,191,.04)}
.dropzone h3{font-size:16px;margin-bottom:8px;color:rgba(255,255,255,.45)}
.dropzone p{font-size:13px;line-height:1.7}
.dropzone code{color:var(--gold);font-size:12px}

/* ── FIGHT HEADER ── */
.fight-title{font-family:var(--font-d);font-size:17px;font-weight:700;color:#fff;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.fight-crown{color:var(--coral);font-size:14px}
.fight-meta{font-size:12px;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.fight-meta .you-tag{color:var(--gold)}

/* Session aggregate */
.agg-box{background:var(--dark2);border:1px solid var(--bd2);border-radius:6px;padding:10px 14px;margin-bottom:12px}
.agg-title{font-family:var(--font-d);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-lt);margin-bottom:8px}
.agg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:5px}
.agg-c{background:rgba(0,0,0,.22);border-radius:4px;padding:5px 8px}
.agg-l{font-size:10px;color:var(--text3);margin-bottom:1px}
.agg-v{font-size:14px;font-weight:700}

/* Target box */
.tgt-box{background:var(--dark2);border:1px solid var(--bd);border-radius:6px;padding:10px 14px;margin-bottom:12px}
.tgt-title{font-family:var(--font-d);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:6px}
.tgt-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px}
.tgt-row:last-child{border-bottom:none}
.tgt-ic{width:18px;text-align:center;flex-shrink:0}
.tgt-nm{flex:1;font-weight:600}
.tgt-hp{color:var(--teal-lt);flex-shrink:0}
.tgt-kl{color:var(--text3);font-size:11px;width:50px;text-align:right;flex-shrink:0}
.clv-badge{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--purple2);border:1px solid rgba(155,89,208,.3);color:var(--purple)}

/* Player tabs */
.ptabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.ptab{padding:4px 11px;border-radius:4px;border:1px solid var(--bd2);background:transparent;
  color:var(--text2);font-size:12px;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:5px}
.ptab:hover{color:var(--text);border-color:var(--bd3)}
.ptab.act{background:var(--teal3);border-color:var(--teal);color:var(--teal-lt)}
.ptab.you{font-weight:700}
.ptab.you.act{background:var(--gold2);border-color:var(--gold);color:var(--gold-lt)}
.ptab-dps{font-size:10px;opacity:.5}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:7px;margin-bottom:14px}
.metric{background:var(--dark2);border:1px solid var(--bd);border-radius:5px;padding:9px 11px}
.m-lbl{font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:600}
.m-val{font-size:21px;font-weight:700;line-height:1}
.cv-t{color:var(--teal-lt)}.cv-g{color:var(--gold-lt)}.cv-r{color:var(--coral)}
.cv-gr{color:var(--green)}.cv-p{color:var(--purple)}

.sec{margin-bottom:14px}
.sec-title{font-family:var(--font-d);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);padding-bottom:5px;border-bottom:1px solid var(--bd);margin-bottom:8px}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:12px;padding:2px 9px;border-radius:4px;border:1px solid var(--bd2);background:rgba(255,255,255,.04);color:rgba(255,255,255,.5)}
.chip.Physical{border-color:rgba(58,123,213,.5);color:#6fa4f0}
.chip.Magic{border-color:rgba(155,89,208,.5);color:#c084fc}
.chip.Spark{border-color:rgba(200,153,26,.5);color:var(--gold-lt)}
.chip.Raw{border-color:rgba(192,74,63,.5);color:#f87171}
.chip.Fire{border-color:rgba(220,100,50,.5);color:#fba07a}
.chip.Water{border-color:rgba(50,150,200,.5);color:#7ab8f5}

/* ── SKILL TABLE — GRID LOCKED ── */
/* Cols: expand(24) | icon(32) | name(1fr) | bar(110) | dmg(72) | avg(68) | crit(68) | kills(44) */
.sk-table{width:100%;margin-bottom:16px}
.sk-thead{
  display:grid;
  grid-template-columns:24px 32px 1fr 110px 72px 60px 68px 68px 44px;
  padding:0 0 4px;border-bottom:1px solid var(--bd2);cursor:default
}
.sk-th{font-family:var(--font-d);font-size:9px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:var(--text3);padding:0 5px;text-align:right;
  cursor:pointer;user-select:none;transition:color .12s}
.sk-th:hover{color:var(--text2)}
.sk-th.sort-asc::after{content:" ▲";color:var(--teal)}
.sk-th.sort-desc::after{content:" ▼";color:var(--teal)}
.sk-th:nth-child(3){text-align:left}

/* Parent row */
.sk-row{
  display:grid;
  grid-template-columns:24px 32px 1fr 110px 72px 60px 68px 68px 44px;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,.04);
  min-height:36px
}
.sk-row:hover{background:rgba(255,255,255,.025)}
.sk-row:last-child{border-bottom:none}

/* Child row — indented with connector */
.sk-row.child{
  background:rgba(0,0,0,.12);
  border-bottom:1px solid rgba(255,255,255,.025);
}
.sk-row.child:hover{background:rgba(0,0,0,.06)}

/* Cells */
.sk-exp{display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--text3);cursor:pointer;padding:8px 0}
.sk-exp.has{color:var(--teal-lt)}.sk-exp.has:hover{color:var(--teal)}
.sk-ic{display:flex;align-items:center;justify-content:center;font-size:15px;padding:0 2px}
.sk-row.child .sk-ic{font-size:12px;opacity:.75}
.sk-real-icon{width:26px;height:26px;border-radius:5px;object-fit:cover;display:block}
.sk-row.child .sk-real-icon{width:20px;height:20px;opacity:.85}
.sk-emoji{line-height:1}
.sk-emoji.npc{opacity:.45;filter:grayscale(.6)}
.sk-name-cell{padding:5px 8px 5px 2px;min-width:0}
.sk-disp{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sk-row.child .sk-disp{font-size:12px;color:rgba(255,255,255,.6)}
.sk-sub{display:flex;align-items:center;gap:4px;margin-top:1px}
.sk-raw{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
/* Child indent connector */
.sk-connector{
  display:inline-block;color:rgba(255,255,255,.2);margin-right:4px;
  font-size:12px;vertical-align:middle
}
.aff-tag{font-size:10px;padding:0 4px;border-radius:2px;font-weight:700;flex-shrink:0}
.aff-P{background:rgba(58,123,213,.2);color:#6fa4f0}
.aff-M{background:rgba(155,89,208,.2);color:#c084fc}
.aff-R{background:rgba(192,74,63,.2);color:#f87171}
.aff-S{background:rgba(200,153,26,.2);color:var(--gold-lt)}
.aff-F{background:rgba(220,100,50,.2);color:#fba07a}
.aff-W{background:rgba(50,150,200,.2);color:#7ab8f5}
/* Bar */
.sk-bar-cell{padding:0 8px 0 2px}
.sk-bw{position:relative;height:14px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.sk-bf{height:100%;border-radius:3px}
.sk-bpct{position:absolute;left:5px;top:0;bottom:0;display:flex;align-items:center;
  font-size:10px;font-weight:700;color:rgba(255,255,255,.85);pointer-events:none}
/* Numeric cells */
.sk-n{padding:6px 5px;text-align:right;font-size:12px;color:var(--text2)}
.sk-n.hi{color:var(--gold-lt);font-weight:700}
.sk-n.sm{font-size:11px}
/* Aggregate indicator on parent */
.sk-agg-badge{font-size:9px;padding:0 4px;border-radius:2px;
  background:rgba(26,157,191,.15);color:var(--teal-lt);margin-left:4px;vertical-align:middle}
/* Expand detail */
.sk-detail{
  grid-column:1/-1;background:rgba(0,0,0,.18);
  border-left:3px solid rgba(26,157,191,.28);
  padding:8px 10px 8px 60px;display:none
}
.sk-detail.show{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:5px}
.skg{background:rgba(255,255,255,.04);border-radius:4px;padding:5px 7px}
.skg-l{font-size:10px;color:var(--text3)}
.skg-v{font-size:14px;font-weight:700}
.sk-raw-full{grid-column:1/-1;font-size:10px;color:var(--text3);
  font-family:monospace;background:rgba(0,0,0,.2);padding:3px 7px;border-radius:3px}

/* ── TIMELINE ── */
.tl-sec{margin-top:14px}
.tl-tabs{display:flex;gap:4px;margin-bottom:9px;flex-wrap:wrap}
.tl-tab{padding:4px 10px;border-radius:4px;border:1px solid var(--bd2);
  background:rgba(255,255,255,.03);color:var(--text2);font-size:11px;cursor:pointer;transition:all .12s}
.tl-tab:hover{color:var(--text);border-color:var(--bd3)}
.tl-tab.act{background:var(--teal3);border-color:var(--teal);color:var(--teal-lt)}
.tl-tab.boss-t{border-color:rgba(224,85,64,.35);color:rgba(224,85,64,.65)}
.tl-tab.boss-t.act{background:rgba(224,85,64,.1);color:var(--coral)}
.tl-tbl{width:100%;border-collapse:collapse}
.tl-tbl th{font-family:var(--font-d);font-size:9px;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;color:var(--text3);padding:0 7px 5px;text-align:left;
  border-bottom:1px solid var(--bd2)}
.tl-tbl th:last-child{text-align:right}
.tl-tbl td{padding:3px 7px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;color:var(--text2)}
.tl-tbl tr:last-child td{border-bottom:none}
.tl-tbl tr:hover td{background:rgba(255,255,255,.02)}
.tl-time{font-family:monospace;font-size:11px;color:var(--text3);white-space:nowrap}
.tl-src{font-weight:700;white-space:nowrap}.tl-src.you{color:var(--gold-lt)}
.tl-sk{color:var(--text);white-space:nowrap;overflow:hidden;max-width:190px}
.tl-tgt{color:var(--text3);font-size:11px;white-space:nowrap}
.tl-dmg{font-weight:700;color:var(--coral);text-align:right;white-space:nowrap}
.tl-dmg.crit{color:var(--gold-lt)}
.tl-more{padding:7px;text-align:center;font-size:12px;color:var(--text3);border-top:1px solid var(--bd)}
.tl-empty{padding:18px;text-align:center;color:var(--text3);font-size:13px}

/* ── COMPARATOR ── */
.cmp-box{background:var(--dark2);border:1px solid var(--bd2);border-radius:6px;padding:12px 14px;margin-bottom:12px}
.cmp-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:0}
.cmp-title{font-family:var(--font-d);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35)}
.cmp-toggle{font-size:12px;color:var(--teal-lt);transition:transform .15s}
.cmp-toggle.open{transform:rotate(90deg)}
.cmp-body{display:none;margin-top:10px}
.cmp-body.open{display:block}
.cmp-picks{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.cmp-pick label{font-size:11px;color:var(--text3);display:block;margin-bottom:3px}
.cmp-pick select{width:100%;background:rgba(0,0,0,.2);border:1px solid var(--bd2);color:var(--text);
  font-size:12px;padding:5px 7px;border-radius:4px;outline:none}
.cmp-pick select:focus{border-color:var(--teal)}
.cmp-pick select option{background:#1c2330}
.cmp-run-btn{width:100%;padding:7px;border:1px solid var(--teal);border-radius:4px;
  background:var(--teal3);color:var(--teal-lt);font-family:var(--font-d);font-size:10px;
  font-weight:700;letter-spacing:.06em;cursor:pointer;transition:all .12s}
.cmp-run-btn:hover{background:rgba(26,157,191,.25)}
.cmp-result{margin-top:12px;display:none}
.cmp-result.show{display:block}
/* Side-by-side comparison table */
.cmp-table{width:100%;border-collapse:collapse}
.cmp-table th{font-family:var(--font-d);font-size:9px;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;color:var(--text3);padding:4px 8px;border-bottom:1px solid var(--bd2);text-align:center}
.cmp-table th:first-child{text-align:left;width:120px}
.cmp-table td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;text-align:center}
.cmp-table td:first-child{font-size:11px;color:var(--text3);text-align:left;font-weight:600}
.cmp-table tr:last-child td{border-bottom:none}
.cmp-better{color:var(--green);font-weight:700}
.cmp-worse{color:var(--coral)}
.cmp-same{color:var(--text2)}
.cmp-a-hdr{color:var(--teal-lt)!important}.cmp-b-hdr{color:var(--gold-lt)!important}
.cmp-section-hdr td{background:rgba(255,255,255,.04);font-family:var(--font-d);font-size:9px;
  font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.3)!important;
  text-align:left!important;padding-top:7px!important}

/* Pending */
.pending{background:var(--dark2);border:1px dashed rgba(255,255,255,.07);border-radius:4px;padding:6px 11px;font-size:12px;color:rgba(255,255,255,.2);margin-bottom:4px}
.pending strong{color:rgba(255,255,255,.35)}

/* Drop overlay */
#dropOvl{display:none;position:fixed;inset:0;background:rgba(26,157,191,.06);
  border:3px dashed var(--teal);z-index:1000;align-items:center;justify-content:center;
  font-family:var(--font-d);font-size:22px;font-weight:700;color:var(--teal-lt);text-align:center}
#dropOvl.show{display:flex}
#loadBar{display:none;position:fixed;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--teal),var(--gold));z-index:999;animation:sl 1s linear infinite}
@keyframes sl{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
</style>
</head>
<body>
<div id="loadBar"></div>
<div id="dropOvl">Drop log files here<br>
  <span style="font-size:14px;font-weight:400;opacity:.7">.log files</span>
</div>
<div class="app">
<div class="topbar">
  <div class="logo">FAREVER <em>Log Viewer · v1.0-rc3</em></div>
  <div class="top-badges">
    <span class="badge" id="bF">0 fights</span>
    <span class="badge" id="bE">0 events</span>
    <span class="badge" id="bS">0 sessions</span>
  </div>
  <div class="top-actions">
    <button class="topbtn" onclick="document.getElementById('fIn').click()">+ Load files</button>
    <button class="topbtn danger" onclick="clearAll()">Clear</button>
    <input type="file" id="fIn" multiple accept=".log,.json,.lua" onchange="handleFiles(this.files)">
  </div>
</div>
<div class="layout">
<div class="sidebar">
  <div class="sb-top">
    <div class="sb-row">
      <input type="text" id="srch" placeholder="Search..." oninput="renderSB()">
    </div>
    <div class="sb-row">
      <select id="sortSel" onchange="renderSB()">
        <option value="time">Chronological</option>
        <option value="dmg">Damage ↓</option>
        <option value="dur">Duration ↓</option>
        <option value="boss">Boss first</option>
      </select>
      <select id="minDur" onchange="renderSB()">
        <option value="0">Any</option>
        <option value="5">5s+</option>
        <option value="15">15s+</option>
        <option value="30">30s+</option>
        <option value="60">1m+</option>
      </select>
    </div>
    <div class="sb-plrs" id="plrBtns"></div>
  </div>
  <div class="fight-scroll" id="fightScroll"></div>
</div>
<div class="main" id="main">
  <div class="dropzone" id="dz"
    ondragover="dzO(event)" ondragleave="dzL()" ondrop="dzD(event)"
    onclick="document.getElementById('fIn').click()">
    <h3>Drop log files to begin</h3>
    <p>Drag <strong>.log</strong> files from<br>
    <code>Farever\dps-meter\logs</code></p>
  </div>
  <div id="mc"></div>
</div>
</div>
</div>

function skIcon(sk,cat){

  }

}
function skParent(sk,allKeys){
  if(REG[sk]&&REG[sk].parent)return REG[sk].parent;
  // Heartsteel (Shield_Craft_Passive) is a FAC-conditional proc on a 15-20s CD
  // (rank 3 = 15s, rank 1 = 20s). It groups under whichever FAC is active in the fight.
  if(sk==='Shield_Craft_Passive'){
    const fac=[...allKeys].find(s=>categSkill(s)==='fac');
    return fac||null;
  }
  if(sk.endsWith('_Status')){const b=sk.slice(0,-7);if(allKeys.has(b))return b;}
  if(sk.includes('_Rank3_Status')){const b=sk.replace('_Rank3_Status','');if(allKeys.has(b))return b;}
  if(sk.endsWith('_Burn')){const b=sk.slice(0,-5);if(allKeys.has(b))return b;}
  if(sk.endsWith('_Dot')){const b=sk.slice(0,-4);if(allKeys.has(b))return b;}
  return null;
}

function categSkill(n){
  if(['ConsumeFood','ConsumeFlask','ConsumableStatus'].includes(n))return'consumable';
  const l=n.toLowerCase();
  if(['rogue_talent_','warrior_hemorrhage','priest_talent_','warrior_talent_'].some(x=>l.includes(x)))return'talent_dot';
  if(['rogue_sig_','rogue_knives','mage_conduit','warrior_rage'].some(x=>l.includes(x)))return'class_skill';
  if(['_status','_burn','_dot'].some(x=>l.includes(x)))return'dot_status';
  if(l.includes('_passive'))return'passive_proc';
  if(['attackcombo','finalcombo','comboattack'].some(x=>l.includes(x))||(l.endsWith('_combo')&&!l.includes('passive')))return'fac';
  if(/_base_attack/.test(l))return'base_attack';
  return'weapon_skill';
}
function detectCls(sks){
  const s=sks.join(' ').toLowerCase();

  if(['warrior_','hemorrhage','juggernaut'].some(x=>s.includes(x)))return'warrior';

function isBaseAtk(sk){return /_[Bb]ase_?[Aa]ttack\d*$/.test(sk)||/_[Bb]ase_?[Aa]ttack$/.test(sk);}
function getWeaponPrefix(sk){return sk.split('_')[0];}
function buildTree(skills){
  const allKeys=new Set(Object.keys(skills));
  const childrenOf={};
  const childSet=new Set();
  // First pass: registry/suffix parent detection
  for(const sk of allKeys){
    const par=skParent(sk,allKeys);
    if(par&&allKeys.has(par)){
      if(!childrenOf[par])childrenOf[par]=[];
      childrenOf[par].push(sk);
      childSet.add(sk);
    }
  }
  // Second pass: base attacks -> FAC parent
  // Exception: Big Game Hunter bow (Bow_BigGame) allows instant FAC without chain
  const facSkills=[...allKeys].filter(sk=>categSkill(sk)==='fac');
  const bigGameFacs=facSkills.filter(sk=>sk.startsWith('Bow_BigGame'));
  for(const sk of allKeys){
    if(!isBaseAtk(sk)||childSet.has(sk)) continue;
    const wpfx=getWeaponPrefix(sk);
    // Find FAC with matching weapon prefix
    const matchFac=facSkills.find(f=>getWeaponPrefix(f)===wpfx&&!bigGameFacs.includes(f));
    if(matchFac&&allKeys.has(matchFac)){
      if(!childrenOf[matchFac])childrenOf[matchFac]=[];
      childrenOf[matchFac].push(sk);
      childSet.add(sk);
    }
  }
  // Build roots with aggregated totals
  const roots=Object.keys(skills)
    .filter(sk=>!childSet.has(sk))
    .map(sk=>{
      const children=(childrenOf[sk]||[]).map(c=>({sk:c,sr:skills[c]}));
      // Sort children: base attacks first in 1-4 order (Attack, Attack2..),
      // then non-base children (procs/DoTs) by damage desc. Cleaner than
      // damage-sorting the base combo, since all their dmg rolls up to the FAC.
      const atkNum=id=>{const m=id.match(/Attack(\d*)$/);return m?(m[1]?+m[1]:1):null;};
      children.sort((a,a2)=>{
        const na=atkNum(a.sk),nb=atkNum(a2.sk);
        if(na!==null&&nb!==null)return na-nb;        // both base attacks → 1,2,3,4
        if(na!==null)return -1;                       // base attacks before procs
        if(nb!==null)return 1;
        return (a2.sr.td||0)-(a.sr.td||0);            // procs/DoTs by damage
      });
      const childDmg=children.reduce((a,c)=>a+c.sr.td,0);
      return{sk,sr:skills[sk],children,
        sortDmg:skills[sk].td+childDmg,
        childDmg};
    });
  return roots;
}

// Range-match inferred HP -> boss. Overkill inflates inferred HP, so we accept
// a match when registry_hp <= inferred < registry_hp + maxHit (the largest single
// hit in the fight, the max possible overkill). Returns {name,diff,ambiguous} or null.
function matchBoss(inferredHp,maxHit){
  // Observed overkill in real logs is small (typically <250, rarely ~500). A tight
  // tolerance keeps near-neighbor bosses from colliding. Use min(maxHit,300): the
  // killing blow is the only overkill source, and it's usually modest.
  const tol=Math.min(Math.max(maxHit||0,1),300);
  const hits=[];
  for(const b of BOSS_REGISTRY){
    for(const diff of ['normal','hard']){
      const v=b.hp[diff]; if(!v)continue;
      if(inferredHp>=v-1 && inferredHp<= v+tol){
        hits.push({name:b.boss,diff:diff[0].toUpperCase()+diff.slice(1),adds:b.adds,gap:Math.abs(inferredHp-v)});
      }
    }
  }
  if(!hits.length)return null;
  hits.sort((a,b)=>a.gap-b.gap);
  // Only confident if the best match is clearly closer than the runner-up.
  const ambiguous = hits.length>1 && (hits[1].gap-hits[0].gap)<150;
  return {...hits[0],ambiguous};
}

// Turn an internal target id into its real display name. Strips a trailing
// instance number (_2,_3) the mod adds for duplicates and re-appends it.
function humanizeEnemy(id){
  if(!id) return null;
  if(UNIT_NAMES[id]) return UNIT_NAMES[id];
  let inst='', core=id; const im=id.match(/_(\d+)$/);
  if(im){ inst=' '+im[1]; core=id.slice(0,im.index); }
  if(UNIT_NAMES[core]) return UNIT_NAMES[core]+inst;
  // last-resort readable fallback for any id not in the table
  const parts=core.split('_'); const sp=s=>s.replace(/([a-z])([A-Z])/g,'$1 $2');
  if(parts.length>=2){
    let rest=parts.slice(1); const type=parts[0];
    if(rest.length && /^Z\d[WD]$/.test(rest[0])) rest=rest.slice(1);
    const variant=rest.map(sp).join(' ').trim();
    return ((variant?variant+' ':'')+sp(type)).trim()+inst;
  }
  return sp(core)+inst;
}
// Real enemy id = present in the authoritative table, or matches the mob id
// shape. Rejects Companion's stray target_name=Some("PlayerName") values.
function isRealEnemyId(id){
  if(!id) return false;
  if(UNIT_NAMES[id]) return true;
  const core=id.replace(/_(\d+)$/,'');
  if(UNIT_NAMES[core]) return true;
  if(/(^|_)Z\d[WD](_|$)/.test(id)) return true;
  return false;
}
// Is this id a boss (for fight naming / kill-boundary)?
function isBossId(id){
  if(!id) return false;
  const core=id.replace(/_(\d+)$/,'');
  return BOSS_IDS.has(id)||BOSS_IDS.has(core);
}
const KNOWN_YOU=new Set(['Mupki','Critspec','Gossip','Tremalane']);
let allSessions=[],currentFight=null,currentPlayer=null,totalEvents=0;
const sessCol={};
let activePlr='';
let tlTarget='all';
let fightTarget='all';  // NPC filter for the damage breakdown (skill table)
const expandedSk=new Set();
let sortCol='dmg',sortDir=-1; // default: sort by damage desc

// ── LOG PARSING ──────────────────────────────────────────────
const KEPT_RE=/dbg\/decode KEPT weak_source=(\d+) source_name=(\S+) target=(\S+) target_name=(\S+) skill_name=(\S+) affinity_id=(\S+) effect=(\d+) amount=([\d.]+) crit=(true|false) kill=(true|false)/;
const TS_RE=/^\[(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3})\]/;
function pOpt(s){const m=s.match(/^Some\("(.*)"\)$/);return m?m[1]:null;}

function parseLOG(text,fname){
  const fromLogger=/\bSNAPSHOT \{/.test(text); // our plugin emits SNAPSHOT lines; Companion does not
  const lines=text.split('\n'),raw=[];
  for(const line of lines){
    const tm=line.match(TS_RE),km=line.match(KEPT_RE);
    if(!tm||!km)continue;
    const sn=pOpt(km[2]),sk=pOpt(km[5]);if(!sn||!sk)continue;
    const thp=line.match(/tgt_hp=(\d+)/),tpct=line.match(/tgt_pct=([\d.]+)/); // v4 fields (optional)
    raw.push({ts:new Date(tm[1].replace(' ','T')+'Z').getTime(),ts_str:tm[1],
      sn,sk,ta:km[3],tn:pOpt(km[4]),aff:pOpt(km[6]),eff:parseInt(km[7]),
      amt:parseFloat(km[8]),crit:km[9]==='true',kill:km[10]==='true',
      thp:thp?+thp[1]:null,tpct:tpct?+tpct[1]:null});
  }
  const seen={},deduped=[];
  for(const ev of raw){
    const k=ev.sn+'|'+ev.sk+'|'+ev.ta+'|'+ev.amt;
    if(seen[k]!==undefined&&(ev.ts-seen[k])<50)continue;
    seen[k]=ev.ts;deduped.push(ev);
  }
  totalEvents+=deduped.length;
  if(!deduped.length)return null;
  // CRITICAL: events can arrive out of chronological order (the store lists fight
  // keys out of sequence; logger timestamps can interleave). Sort by time before
  // segmenting, or the gap logic shatters fights and produces negative durations.
  deduped.sort((a,b)=>a.ts-b.ts);
  const rawSegs=[[deduped[0]]];
  for(let i=1;i<deduped.length;i++){
    if((deduped[i].ts-deduped[i-1].ts)/1000>8)rawSegs.push([]);
    rawSegs[rawSegs.length-1].push(deduped[i]);
  }
  // ── BOSS-KILL BOUNDARY: a boss dying ends the fight on the spot ────────────
  // v4 logs carry a kill flag validated against tgt_pct→0 (100% reliable). When a
  // boss-named target dies, force a segment break right after, so a boss kill
  // can't bleed into the next trash pull even if it's <8s away. Trash kills don't
  // split (only boss aliases), keeping mob packs intact.
  {
    const split=[];
    for(const seg of rawSegs){
      let cur=[];
      for(const ev of seg){
        cur.push(ev);
        const isBossKill = ev.kill && ev.tn && isBossId(ev.tn);
        if(isBossKill){ split.push(cur); cur=[]; }
      }
      if(cur.length) split.push(cur);
    }
    rawSegs.length=0; rawSegs.push(...split);
  }
  // ── STITCH PASS: rebuild a fragmented boss fight into one encounter ────────
  // Bosses keep a stable target address across built-in downtime (immune / kite /
  // platform / cannon phases), so a boss address recurring after a gap means the
  // SAME fight. We stitch by "boss sessions": each boss address's events split
  // into sessions wherever they're >MERGE_GAP apart (that separates re-pulls /
  // wipes / multiple clears). Every 8s-segment overlapping a session window is
  // folded into that one encounter; segments touching no boss stay standalone.
  const MERGE_GAP=60;              // s; real phase downtime < this, idle breaks > this
  const BOSS_DMG_THRESHOLD=2000;   // Companion fallback when there are no names
  // Identify boss addresses. Plugin logs: any address whose name resolves to a
  // known boss. Companion logs (no names): the sustained high-damage address.
  // Always exclude the "untargeted" bucket (empty name → one shared address).
  const untargetedAddrs=new Set();
  {
    const hasName={};
    deduped.forEach(ev=>{ if(ev.tn) hasName[ev.ta]=true; });
    deduped.forEach(ev=>{ if(!hasName[ev.ta]) untargetedAddrs.add(ev.ta); });
  }
  const bossAddrs=new Set();
  deduped.forEach(ev=>{ if(ev.tn && isBossId(ev.tn)) bossAddrs.add(ev.ta); });
  if(!bossAddrs.size && !fromLogger){
    const td={};
    deduped.forEach(ev=>{ if(ev.eff===0 && !untargetedAddrs.has(ev.ta)) td[ev.ta]=(td[ev.ta]||0)+ev.amt; });
    Object.entries(td).filter(([,d])=>d>=BOSS_DMG_THRESHOLD).forEach(([a])=>bossAddrs.add(a));
  }
  bossAddrs.forEach(a=>{ if(untargetedAddrs.has(a)) bossAddrs.delete(a); });
  // Build boss-session windows: [start,end] spans during which a boss is active.
  const windows=[];
  bossAddrs.forEach(addr=>{
    const ts=deduped.filter(ev=>ev.ta===addr && ev.eff===0).map(ev=>ev.ts).sort((a,b)=>a-b);
    if(!ts.length)return;
    let s=ts[0],last=ts[0];
    for(let i=1;i<ts.length;i++){
      if((ts[i]-last)/1000>MERGE_GAP){windows.push([s,last]);s=ts[i];}
      last=ts[i];
    }
    windows.push([s,last]);
  });
  // Stitch: a segment joins an encounter if it overlaps (within MERGE_GAP of) a
  // boss window. Segments sharing a window merge; others stay standalone.
  function windowOf(seg){
    const a=seg[0].ts,b=seg[seg.length-1].ts;
    for(let w=0;w<windows.length;w++){
      const [ws,we]=windows[w];
      if(a<=we+MERGE_GAP*1000 && b>=ws-MERGE_GAP*1000) return w;
    }
    return -1;
  }
  const byWin={},stitched=[];
  rawSegs.forEach(seg=>{
    const w=windowOf(seg);
    if(w<0){ stitched.push(seg); }
    else { (byWin[w]=byWin[w]||[]).push(...seg); }
  });
  Object.values(byWin).forEach(evs=>{ evs.sort((a,b)=>a.ts-b.ts); stitched.push(evs); });
  stitched.sort((a,b)=>a[0].ts-b[0].ts);
  const segs=stitched;
  const fights=[];
  let gBase=allSessions.reduce((a,s)=>a+s.fights.length,0)+1;
  segs.forEach(seg=>{
    const st=seg[0].ts,dur=(seg[seg.length-1].ts-st)/1000;
    if(dur<2)return;
    const plrs={},mDmg={},mKills={},allEvts=[],skH={},clvE=[];
    seg.forEach(ev=>{
      const{sn,sk}=ev;
      if(!plrs[sn])plrs[sn]={name:sn,total_damage:0,dps:0,hit_count:0,crit_count:0,
        kill_count:0,crit_rate:0,skills:{},damage_by_affinity:{},
        leech:{total:0},cls:'unknown'};
      const p=plrs[sn];
      if(['ConsumeFood','ConsumeFlask','ConsumableStatus'].includes(sk))return;
      if(ev.eff===1){p.leech.total+=ev.amt;return;}
      const ai=Math.round(ev.amt);
      if(!mDmg[ev.ta])mDmg[ev.ta]=[];
      mDmg[ev.ta].push(ai);
      if(!p.skills[sk])p.skills[sk]={td:0,h:0,cr:0,kl:0,mn:null,mx:null,av:0,af:ev.aff||'?',ca:categSkill(sk),cr_r:0,pct:0};
      const sr=p.skills[sk];
      sr.td+=ai;sr.h++;if(ev.crit)sr.cr++;if(ev.kill)sr.kl++;
      if(sr.mn===null||ai<sr.mn)sr.mn=ai;if(sr.mx===null||ai>sr.mx)sr.mx=ai;
      if(ev.aff)sr.af=ev.aff;
      p.damage_by_affinity[ev.aff||'Unknown']=(p.damage_by_affinity[ev.aff||'Unknown']||0)+ai;
      p.total_damage+=ai;p.hit_count++;if(ev.crit)p.crit_count++;
      if(ev.kill){p.kill_count++;mKills[ev.ta]=ev.ts;}
      // full chronological events
      allEvts.push({ts_s:Math.round((ev.ts-st)/100)/10,source:sn,skill:sk,
        affinity:ev.aff||'?',amount:ai,crit:ev.crit,kill:ev.kill,target:ev.ta,tname:ev.tn});
      // cleave — a real cleave hits multiple DISTINCT targets near-simultaneously
      // with the SAME skill from the SAME source. Key by source|skill (not skill
      // alone, which conflated different players/NPCs), use a tight 1s window
      // (not 60s, which counted unrelated DoT ticks on separate mobs), and only
      // count known-player sources so enemy abilities never show as your cleave.
      if(KNOWN_YOU.has(sn)){
        const ck=sn+'|'+sk;
        if(!skH[ck])skH[ck]=[];
        skH[ck].push({ts:ev.ts,ta:ev.ta});
        skH[ck]=skH[ck].filter(e=>ev.ts-e.ts<=1.0);
        const u=new Set(skH[ck].map(e=>e.ta)).size;
        if(u>1){
          if(!clvE.length||(ev.ts-clvE[clvE.length-1].ts_ms)>100)
            clvE.push({ts_ms:ev.ts,ts_s:Math.round((ev.ts-st)/100)/10,skill:sk,src:sn,targets:u});
          else clvE[clvE.length-1].targets=Math.max(clvE[clvE.length-1].targets,u);
        }
      }
    });
    const hpL=Object.entries(mKills).map(([a])=>mDmg[a]?mDmg[a].reduce((s,v)=>s+v,0):0).filter(v=>v>0).sort((a,b)=>a-b);
    const unkMax=Math.max(...Object.entries(mDmg).filter(([a])=>!mKills[a]).map(([,v])=>v.reduce((s,x)=>s+x,0)),0);
    const maxHp=Math.max(hpL.length?hpL[hpL.length-1]:0,unkMax);
    const isBoss=maxHp>3000;
    // ── ENEMY NAMING ──────────────────────────────────────────────────
    // Prefer REAL names from the logger (event.tname). Only fall back to HP
    // fingerprinting for legacy Companion logs that lack real target_name.
    const knownPlrs=Object.keys(plrs).filter(n=>KNOWN_YOU.has(n));
    const isSolo=Object.keys(plrs).length===1 || (knownPlrs.length===1 && Object.keys(plrs).length<=1);
    let maxHit=0; allEvts.forEach(e=>{if(e.amount>maxHit)maxHit=e.amount;});
    // resolve a real internal id per target address (last non-empty wins)
    const realId={};
    allEvts.forEach(e=>{ if(isRealEnemyId(e.tname)) realId[e.target]=e.tname; });
    const hasReal=Object.keys(realId).length>0;

    const tDmg={};allEvts.forEach(e=>{tDmg[e.target]=(tDmg[e.target]||0)+e.amount;});
    const sT=Object.entries(tDmg).sort((a,b)=>b[1]-a[1]);
    const tL={};
    let bossLabel=null, bossMatch=null, bossAmbiguous=false;

    if(hasReal){
      // Name every target straight from its internal id.
      sT.forEach(([a,])=>{ tL[a]=realId[a]?(humanizeEnemy(realId[a])||'Untargeted'):'Untargeted'; });
      // The "boss" of the fight = highest-damage target whose id is a known boss.
      for(const [a,] of sT){
        const id=realId[a];
        if(id && isBossId(id)){
          bossLabel=humanizeEnemy(id); break;
        }
      }
    } else {
      // ── legacy fallback: HP range-match w/ overkill tolerance (solo only) ──
      // Only for Companion logs. Our logger's fights without a real name are
      // "untargeted", not an unknown boss — fingerprinting them yields false hits.
      if(!fromLogger && isBoss && (Object.keys(plrs).length===1)){
        bossMatch=matchBoss(maxHp,maxHit);
      }
      bossAmbiguous=bossMatch?bossMatch.ambiguous:false;
      bossLabel=bossMatch?`${bossMatch.name}${bossMatch.ambiguous?'?':''} (${bossMatch.diff})`:null;
      const addNames=bossMatch?bossMatch.adds:[];
      let addIdx=0;
      sT.forEach(([a,],i)=>{
        if(fromLogger){ tL[a]='Untargeted'; }       // logger emitted no name for this hit
        else if(isBoss&&i===0){ tL[a]=bossLabel||'Boss*'; }
        else if(isBoss){
          if(addNames.length){ tL[a]=addNames[Math.min(addIdx,addNames.length-1)]; addIdx++; }
          else tL[a]=`Add ${i}`;
        } else tL[a]=`Target ${i+1}`;
      });
    }
    allEvts.forEach(e=>{e.tl=tL[e.target]||'?';});
    const totDmg=Object.values(plrs).reduce((a,p)=>a+p.total_damage,0);
    if(totDmg<50)return;
    Object.values(plrs).forEach(p=>{
      p.dps=Math.round(p.total_damage/dur*10)/10;
      p.crit_rate=p.hit_count?Math.round(p.crit_count/p.hit_count*1000)/1000:0;
      p.leech.total=Math.round(p.leech.total);
      p.cls=detectCls(Object.keys(p.skills));
      Object.entries(p.skills).forEach(([,sr])=>{
        sr.cr_r=sr.h?Math.round(sr.cr/sr.h*1000)/1000:0;
        sr.av=sr.h?Math.round(sr.td/sr.h*10)/10:0;
        sr.pct=p.total_damage?Math.round(sr.td/p.total_damage*10000)/10000:0;
      });
    });
    const sP=Object.fromEntries(Object.entries(plrs).sort((a,b)=>b[1].total_damage-a[1].total_damage));
    const yC=Object.keys(sP).filter(n=>KNOWN_YOU.has(n));
    const hasYou=yC.length>0;
    fights.push({global_id:gBase++,duration_s:Math.round(dur*10)/10,
      start_time:seg[0].ts_str,end_time:seg[seg.length-1].ts_str,
      player_count:Object.keys(plrs).length,total_damage_all_players:totDmg,
      players:sP,
      all_events:hasYou?allEvts.slice(0,isBoss?500:120):[],
      hp_pool_list:hpL,is_boss:isBoss,boss_hp:maxHp,unkilled_hp:unkMax,
      boss_name:bossLabel,boss_ambiguous:bossAmbiguous,
      kill_count:Object.values(plrs).reduce((a,p)=>a+p.kill_count,0),
      cleave_detected:clvE.some(c=>c.targets>1),
      max_targets_hit:Math.max(...clvE.map(c=>c.targets),1),
      cleave_events:clvE.slice(0,5),target_labels:tL,
      has_you:hasYou,your_chars:yC});
  });
  if(!fights.length)return null;
  const yAll=new Set(fights.flatMap(f=>f.your_chars));
  const lbl=fname.replace('farever-farever-probe-','').replace(/_txt/g,'').replace(/\.log$/,'').replace(/_/g,' ');
  return{label:lbl,log_file:fname,fight_count:fights.length,
    total_damage:fights.reduce((a,f)=>a+f.total_damage_all_players,0),
    event_count:deduped.length,your_characters:[...yAll],fights};
}

// ── PLUGIN STORE INGEST ───────────────────────────────────────────────────
// The minimap logger writes ONE file, data/plugins/farever_logger.store.lua,
// a Lua table:  return { ["flog_1"]="...", ["flog_2"]="...", ... }.
// Each flog value is the fight's log text with Lua-escaped quotes/newlines.
// Convert it back to plain KEPT log lines so parseLOG can read it directly.
function storeToLog(text){
  const out=[];
  // grab each   ["flog_N"] = "....."   value (non-greedy, allows escaped quotes)
  const re=/\["flog_\d+"\]\s*=\s*"((?:[^"\\]|\\.)*)"/g;
  let m;
  while((m=re.exec(text))!==null){
    // reverse Lua string escaping: \n -> newline, \" -> ", \\ -> \, \t -> tab
    const body=m[1]
      .replace(/\\n/g,'\n').replace(/\\t/g,'\t')
      .replace(/\\"/g,'"').replace(/\\\\/g,'\\');
    out.push(body);
  }
  return out.join('\n');
}
function parseSTORE(text,fname){
  return parseLOG(storeToLog(text),fname);
}
async function handleFiles(files){
  if(!files||!files.length)return;
  document.getElementById('loadBar').style.display='block';
  for(const file of Array.from(files)){
    const text=await file.text(),ext=file.name.split('.').pop().toLowerCase();
    try{
      if(ext==='log'){const s=parseLOG(text,file.name);if(s&&!allSessions.find(x=>x.log_file===s.log_file))allSessions.push(s);}
      else if(ext==='lua'||/\["flog_\d+"\]\s*=/.test(text)){
        const s=parseSTORE(text,file.name);if(s&&!allSessions.find(x=>x.log_file===s.log_file))allSessions.push(s);}
      else if(ext==='json'){
        const d=JSON.parse(text);
        if(d.sessions)d.sessions.forEach(s=>{if(!allSessions.find(x=>x.log_file===s.log_file)){allSessions.push(s);totalEvents+=(s.event_count||0);}});
      }
    }catch(e){console.error(file.name,e);}
  }
  allSessions.sort((a,b)=>a.label.localeCompare(b.label));
  document.getElementById('loadBar').style.display='none';
  document.getElementById('dz').style.display='none';
  updateBadges();buildPlrBtns();renderSB();
  if(!currentFight){
    for(const s of allSessions){const f=s.fights.find(f=>f.has_you);if(f){selectFight(f);break;}}
  }
}
function clearAll(){
  allSessions=[];currentFight=null;currentPlayer=null;totalEvents=0;activePlr='';
  expandedSk.clear();sortCol='dmg';sortDir=-1;
  updateBadges();buildPlrBtns();renderSB();
  document.getElementById('mc').innerHTML='';
  document.getElementById('dz').style.display='block';
}
function updateBadges(){
  const tf=allSessions.reduce((a,s)=>a+s.fight_count,0);
  document.getElementById('bF').textContent=tf+' fights';
  document.getElementById('bE').textContent=totalEvents.toLocaleString()+' events';
  document.getElementById('bS').textContent=allSessions.length+' session'+(allSessions.length!==1?'s':'');
}
function buildPlrBtns(){
  const pm={};
  allSessions.forEach(s=>s.fights.forEach(f=>{
    Object.entries(f.players||{}).forEach(([n,p])=>{
      if(!pm[n])pm[n]={cls:p.cls||'unknown',you:KNOWN_YOU.has(n),dps:0,cnt:0};
      pm[n].dps+=p.dps||0;pm[n].cnt++;
    });
  }));
  const sorted=Object.entries(pm).sort((a,b)=>{
    if(a[1].you!==b[1].you)return a[1].you?-1:1;
    return b[1].dps-a[1].dps;
  });
  const c=document.getElementById('plrBtns');
  if(!sorted.length){c.innerHTML='';return;}
  c.innerHTML=sorted.slice(0,16).map(([n,info])=>{
    const avg=info.cnt?Math.round(info.dps/info.cnt):0;
    const act=activePlr===n?'active':'';
    const cls=clsCss(info.cls);
    const star=info.you?'<span class="plr-star">★</span> ':'';
    return`<button class="plr-btn ${cls} ${act}" onclick="togglePlr('${n}')">${star}${n} <span style="opacity:.45;font-size:10px">${avg}</span></button>`;
  }).join('');
}
function togglePlr(n){activePlr=activePlr===n?'':n;buildPlrBtns();renderSB();}

// ── SIDEBAR ──────────────────────────────────────────────────
function getFights(sess){
  const q=(document.getElementById('srch').value||'').toLowerCase().trim();
  const sort=document.getElementById('sortSel').value;
  const minD=parseInt(document.getElementById('minDur').value||'0');
  let fs=[...sess.fights];
  if(minD>0)fs=fs.filter(f=>f.duration_s>=minD);
  if(q)fs=fs.filter(f=>Object.keys(f.players||{}).some(n=>n.toLowerCase().includes(q))||String(f.global_id).includes(q));
  if(activePlr)fs=fs.filter(f=>f.players&&f.players[activePlr]);
  if(sort==='dmg')fs.sort((a,b)=>b.total_damage_all_players-a.total_damage_all_players);
  else if(sort==='dur')fs.sort((a,b)=>b.duration_s-a.duration_s);
  else if(sort==='boss')fs.sort((a,b)=>(b.is_boss?1:0)-(a.is_boss?1:0)||a.global_id-b.global_id);
  return fs;
}
function renderSB(){
  let h='';
  allSessions.forEach((sess,si)=>{
    const fs=getFights(sess);if(!fs.length)return;
    const col=sessCol[si];
    const yc=sess.your_characters||[];
    const sT=fs.reduce((a,f)=>a+f.total_damage_all_players,0);
    const oBadge=sess.outcome?`<span class="${sess.outcome==='clear'?'o-clear':'o-wipe'}">${sess.outcome.toUpperCase()}</span>`:'';
    const diff=sess.difficulty?` <span style="font-size:9px;color:rgba(255,255,255,.35)">${sess.difficulty}</span>`:'';
    h+=`<div>
      <div class="sess-hdr${col?' col':''}" onclick="toggleSess(${si})">
        <span class="sess-arrow">▼</span>
        <span class="sess-lbl">${sess.label}${diff}${oBadge}</span>
        <span class="sess-cnt">${fs.length}f</span>
      </div>
      <div class="sess-sum">
        <div class="ss-r">Fights <span>${fs.length}</span></div>
        <div class="ss-r">Damage <span>${fmtN(sT)}</span></div>
        ${yc.length?`<div class="ss-r">You <span class="you">${yc.join(', ')}</span></div>`:''}
      </div>
      <div id="sf_${si}" style="display:${col?'none':'block'}">`;
    fs.forEach(f=>{
      const act=currentFight&&currentFight.global_id===f.global_id?'act':'';
      const plrs=Object.keys(f.players||{});
      const yH=plrs.filter(p=>KNOWN_YOU.has(p));
      const you=f.has_you?'you':'';
      const boss=f.is_boss?'boss':'';
      const who=yH.length?yH.join(', '):plrs.slice(0,3).join(', ');
      // real fight name: boss name, else the top enemy label, else fall back to BOSS tag
      let fname=f.boss_name||null;
      if(!fname){
        const lbls={};(f.all_events||[]).forEach(e=>{const l=e.tl;if(l&&l!=='?'&&!/^Target \d+$/.test(l)&&!/^Add \d+$/.test(l)&&l!=='Boss*')lbls[l]=(lbls[l]||0)+(e.amount||0);});
        const top=Object.entries(lbls).sort((a,b)=>b[1]-a[1])[0];
        if(top)fname=top[0];
      }
      const nameTag=fname?`<span class="fi-name">${f.boss_name?'👑 ':''}${fname}</span>`:(f.is_boss?`<span class="fi-btag">BOSS</span>`:'');
      const clv=f.cleave_detected&&f.max_targets_hit>1?`<div class="fi-clv">↔ ${f.max_targets_hit}T</div>`:'';
      const fd=JSON.stringify(f).replace(/\\/g,'\\\\').replace(/"/g,'&quot;');
      h+=`<div class="fi ${act} ${you} ${boss}" onclick='sFD(this)' data-f="${fd}">
        <div class="fi-top"><span class="fi-id">#${f.global_id}</span><span class="fi-dur">${fmtDur(f.duration_s)}</span></div>
        ${nameTag?`<div class="fi-nm">${nameTag}</div>`:''}
        <div class="fi-dmg">${fmtN(f.total_damage_all_players)} · ${f.player_count}p</div>
        <div class="fi-who ${f.has_you?'you':''}">${who||'?'}</div>${clv}
      </div>`;
    });
    h+=`</div></div>`;
  });
  if(!h)h='<div style="padding:14px;color:var(--text3);font-size:13px">No fights match</div>';
  document.getElementById('fightScroll').innerHTML=h;
}
function toggleSess(si){sessCol[si]=!sessCol[si];renderSB();}
function sFD(el){
  try{selectFight(JSON.parse(el.getAttribute('data-f').replace(/&quot;/g,'"')));}catch(e){console.error(e);}
}
function selectFight(f){
  currentFight=f;expandedSk.clear();tlTarget='all';fightTarget='all';
  const plrs=Object.keys(f.players||{});
  currentPlayer=plrs.find(p=>KNOWN_YOU.has(p))||plrs[0];
  renderSB();renderFight();
  document.getElementById('dz').style.display='none';
}
function selectPlayer(n){currentPlayer=n;expandedSk.clear();renderFight();}
function toggleSk(sk){expandedSk.has(sk)?expandedSk.delete(sk):expandedSk.add(sk);renderFight();}
function setTlTarget(t){tlTarget=t;renderFight();}
function setFightTarget(t){fightTarget=t;expandedSk.clear();renderFight();}
function setSort(col){
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=-1;}
  renderFight();
}

// ── FIGHT RENDER ─────────────────────────────────────────────
function renderFight(){
  if(!currentFight)return;
  const f=currentFight;
  const plrs=Object.keys(f.players||{});
  const p=f.players[currentPlayer];
  const sess=allSessions.find(s=>s.fights.some(x=>x.global_id===f.global_id));
  const allF=allSessions.flatMap(s=>s.fights);

  let h=`<div class="fight-title">Fight #${f.global_id}${f.is_boss?(f.boss_name?` <span class="fight-crown">👑 ${f.boss_name}</span>`:` <span class="fight-crown">👑 Boss · ~${fmtN(f.boss_hp)} HP</span>`):''}</div>
  <div class="fight-meta">
    <span>⏱ ${fmtDur(f.duration_s)}</span>
    <span>👥 ${f.player_count}p</span>
    <span>🕐 ${fmtTime(f.start_time)}</span>
    ${f.your_chars&&f.your_chars.length?`<span class="you-tag">★ ${f.your_chars.join(', ')}</span>`:''}
  </div>`;

  // Session aggregate
  if(sess){
    const sF=sess.fights,sD=sF.reduce((a,x)=>a+x.total_damage_all_players,0);
    const yF=sF.filter(x=>x.has_you);
    const avgDps=yF.length?Math.round(yF.reduce((a,x)=>{const yp=Object.values(x.players).find(pp=>KNOWN_YOU.has(pp.name));return a+(yp?yp.dps:0);},0)/yF.length):0;
    h+=`<div class="agg-box">
      <div class="agg-title">📊 ${sess.label}</div>
      <div class="agg-grid">
        <div class="agg-c"><div class="agg-l">Fights</div><div class="agg-v">${sF.length}</div></div>
        <div class="agg-c"><div class="agg-l">Total Damage</div><div class="agg-v">${fmtN(sD)}</div></div>
        <div class="agg-c"><div class="agg-l">Boss Fights</div><div class="agg-v">${sF.filter(x=>x.is_boss).length}</div></div>
        <div class="agg-c"><div class="agg-l">Your Fights</div><div class="agg-v">${yF.length}</div></div>
        <div class="agg-c"><div class="agg-l">Avg DPS</div><div class="agg-v cv-t">${avgDps}</div></div>
        <div class="agg-c"><div class="agg-l">Events</div><div class="agg-v">${fmtN(sess.event_count||0)}</div></div>
      </div>
    </div>`;
  }

  // Comparator
  h+=renderCmp(allF,f);

  // Target analysis — prefer REAL named NPCs (from the logger); fall back to inferred HP.
  const evAll=f.all_events||[];
  // per-target damage tally across all sources in this fight, using real labels
  const npcTally={};
  evAll.forEach(e=>{ const l=e.tl||'?'; if(!npcTally[l])npcTally[l]={dmg:0,hits:0,kills:0}; npcTally[l].dmg+=e.amount||0; npcTally[l].hits++; if(e.kill)npcTally[l].kills++; });
  const npcRows=Object.entries(npcTally).sort((a,b)=>b[1].dmg-a[1].dmg);
  // "real" if we have any label that isn't a generic placeholder
  const hasRealNpc=npcRows.some(([l])=>l&&l!=='?'&&!/^Target \d+$/.test(l)&&!/^Add \d+$/.test(l)&&l!=='Boss*');

  if(hasRealNpc){
    const totD=npcRows.reduce((a,[,v])=>a+v.dmg,0)||1;
    h+=`<div class="tgt-box"><div class="tgt-title">Enemies (${npcRows.length})</div>`;
    npcRows.forEach(([lbl,v])=>{
      const isBossRow=f.boss_name&&lbl===f.boss_name;
      h+=`<div class="tgt-row">
        <span class="tgt-ic">${isBossRow?'👑':'👾'}</span>
        <span class="tgt-nm">${lbl}</span>
        <span class="tgt-hp">${fmtN(Math.round(v.dmg))} (${(v.dmg/totD*100).toFixed(1)}%)</span>
        <span class="tgt-kl">${v.kills?`${v.kills} kill${v.kills>1?'s':''}`:'—'}</span>
      </div>`;
    });
    h+=`<div style="font-size:11px;color:var(--text3);margin-top:4px;opacity:.6">Real enemy names from the in-game logger.</div></div>`;
  } else {
    const hpL=f.hp_pool_list||[];
    h+=`<div class="tgt-box"><div class="tgt-title">Target Analysis (Inferred)</div>`;
    if(hpL.length){
      const cl={};hpL.forEach(hp=>{const b=Math.round(hp/100)*100;if(!cl[b])cl[b]=[];cl[b].push(hp);});
      Object.entries(cl).sort((a,b)=>b[1].length-a[1].length).slice(0,5).forEach(([b,vs],i)=>{
        const med=Math.round(vs.reduce((s,v)=>s+v,0)/vs.length);
        const boss=med>3000;
        h+=`<div class="tgt-row">
          <span class="tgt-ic">${boss?'🐉':i===0&&f.is_boss?'👑':'👾'}</span>
          <span class="tgt-nm">${boss?'Boss-tier':vs.length>3?`Mob ×${vs.length}`:`Target ${i+1}`}</span>
          <span class="tgt-hp">~${fmtN(med)} HP</span>
          <span class="tgt-kl">${vs.length} killed</span>
        </div>`;
      });
    }
    if(f.unkilled_hp>500){
      h+=`<div class="tgt-row">
        <span class="tgt-ic">⚠️</span>
        <span class="tgt-nm">${f.is_boss?'Boss (kill event missing)':'Target (survived)'}</span>
        <span class="tgt-hp">~${fmtN(f.unkilled_hp)} HP absorbed</span>
        <span class="tgt-kl" style="color:var(--coral)">0 kills</span>
      </div>`;
    }
    h+=`<div style="font-size:11px;color:var(--text3);margin-top:4px;opacity:.6">HP pools aggregated from damage dealt. Addresses recycle per memory pool.</div></div>`;
  }

  // Player tabs
  h+=`<div class="ptabs">`;
  plrs.forEach(n=>{
    const p2=f.players[n];
    const act=n===currentPlayer?'act':'';
    const you=KNOWN_YOU.has(n)?'you':'';
    const cls=clsCss(p2.cls||'unknown');
    h+=`<button class="ptab ${act} ${you} ${cls}" onclick="selectPlayer('${n}')">${KNOWN_YOU.has(n)?'★ ':''}${n} <span class="ptab-dps">${fmtN(p2.dps)}</span></button>`;
  });
  h+=`</div>`;

  if(!p){document.getElementById('mc').innerHTML=h;return;}

  // Metrics
  h+=`<div class="metrics">
    <div class="metric"><div class="m-lbl">DPS</div><div class="m-val cv-t">${fmtN(p.dps)}</div></div>
    <div class="metric"><div class="m-lbl">Damage</div><div class="m-val">${fmtN(p.total_damage)}</div></div>
    <div class="metric"><div class="m-lbl">Crit rate</div><div class="m-val cv-g">${fmtPct(p.crit_rate)}</div></div>
    <div class="metric"><div class="m-lbl">Kills</div><div class="m-val cv-r">${p.kill_count}</div></div>
    <div class="metric"><div class="m-lbl">Leech</div><div class="m-val cv-gr">${fmtN(p.leech.total)}</div></div>
    <div class="metric"><div class="m-lbl">Hits</div><div class="m-val">${fmtN(p.hit_count)}</div></div>
  </div>`;

  // Affinity
  const aff=p.damage_by_affinity||{};
  if(Object.keys(aff).length){
    h+=`<div class="sec"><div class="sec-title">Damage by affinity</div><div class="chips">`;
    Object.entries(aff).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
      const pct=p.total_damage?(v/p.total_damage*100).toFixed(1):0;
      h+=`<div class="chip ${k}">${k} ${fmtN(v)} (${pct}%)</div>`;
    });
    h+=`</div></div>`;
  }

  // Skills — with per-NPC filter (mirrors the timeline's target tabs)
  h+=`<div class="sec-title" style="margin-bottom:6px">Damage breakdown</div>`;
  // build target tabs from THIS player's events
  const myEv=(f.all_events||[]).filter(e=>e.source===currentPlayer);
  const myTgts={};
  myEv.forEach(e=>{const l=e.tl||'?';myTgts[l]=(myTgts[l]||0)+(e.amount||0);});
  const tgtList=Object.entries(myTgts).sort((a,b)=>b[1]-a[1]);
  if(tgtList.length>1){
    // validate current filter still exists
    if(fightTarget!=='all' && !myTgts[fightTarget]) fightTarget='all';
    h+=`<div class="tl-tabs" style="margin-bottom:8px">
      <button class="tl-tab${fightTarget==='all'?' act':''}" onclick="setFightTarget('all')">All (${fmtN(Math.round(p.total_damage))})</button>`;
    tgtList.forEach(([lbl,d])=>{
      const bossT=f.boss_name&&lbl===f.boss_name?' boss-t':'';
      h+=`<button class="tl-tab${bossT}${fightTarget===lbl?' act':''}" onclick="setFightTarget('${lbl.replace(/'/g,"\\'")}')">${lbl} (${fmtN(Math.round(d))})</button>`;
    });
    h+=`</div>`;
  }
  // scope the skill table to the chosen NPC (or all)
  let pScoped=p;
  if(fightTarget!=='all'){
    const sc=skillsForTarget(f,currentPlayer,fightTarget);
    pScoped=Object.assign({},p,{skills:sc.skills,total_damage:sc.total});
  }
  h+=renderSkillTable(pScoped,f.duration_s||0);

  // Timeline
  h+=renderTimeline(f);

  // Pending
  h+=`<div class="sec" style="margin-top:4px"><div class="sec-title">Pending</div>
    <div class="pending"><strong>Buff uptime</strong> — meter doesn't capture buff events</div>
    <div class="pending"><strong>Gear snapshot</strong> — meter exports gear[] as empty</div>
    <div class="pending"><strong>Enemy names</strong> — HP clustering + manual labeling planned</div>
  </div>`;

  document.getElementById('mc').innerHTML=h;
  document.getElementById('mc').scrollTop=0;
}

// ── SKILL TABLE ──────────────────────────────────────────────
// Rebuild a player's per-skill stats scoped to ONE target label (or 'all'),
// from the fight's event list. Mirrors the shape assembled in parseLOG so the
// existing renderSkillTable works unchanged. Used by the NPC damage filter.
function skillsForTarget(f,playerName,tlabel){
  const evts=(f.all_events||[]).filter(e=>e.source===playerName && (tlabel==='all'||e.tl===tlabel));
  const skills={};
  let total=0;
  for(const e of evts){
    if(e.amount==null)continue;
    let sr=skills[e.skill];
    if(!sr){sr=skills[e.skill]={td:0,h:0,cr:0,kl:0,mn:null,mx:null,av:0,af:e.affinity||'?',ca:categSkill(e.skill),cr_r:0,pct:0};}
    sr.td+=e.amount; sr.h++; if(e.crit)sr.cr++; if(e.kill)sr.kl++;
    sr.mn=sr.mn==null?e.amount:Math.min(sr.mn,e.amount);
    sr.mx=sr.mx==null?e.amount:Math.max(sr.mx,e.amount);
    total+=e.amount;
  }
  for(const sr of Object.values(skills)){
    sr.cr_r=sr.h?Math.round(sr.cr/sr.h*1000)/1000:0;
    sr.av=sr.h?Math.round(sr.td/sr.h*10)/10:0;
    sr.pct=total?Math.round(sr.td/total*10000)/10000:0;
    sr.td=Math.round(sr.td*10)/10;
  }
  return {skills,total:Math.round(total*10)/10,events:evts.length};
}

function renderSkillTable(p,fightDur){
  const skills=p.skills||{};
  if(!Object.keys(skills).length)return'';

  let tree=buildTree(skills);

  // Apply sort
  const sortFns={
    dmg:(a,b)=>a.sortDmg-b.sortDmg,
    dps:(a,b)=>a.sortDmg-b.sortDmg,
    avg:(a,b)=>a.sr.av-b.sr.av,
    crit:(a,b)=>a.sr.cr_r-b.sr.cr_r,
    kills:(a,b)=>a.sr.kl-b.sr.kl,
    pct:(a,b)=>a.sortDmg-b.sortDmg,
  };
  const fn=sortFns[sortCol]||sortFns.dmg;
  tree=tree.sort((a,b)=>fn(a,b)*sortDir);

  const maxDmg=tree.length?Math.max(...tree.map(r=>r.sortDmg)):1;

  function thSort(col,label,style=''){
    const isSorted=sortCol===col;
    const cls=isSorted?(sortDir===-1?'sort-desc':'sort-asc'):'';
    return`<div class="sk-th ${cls}" onclick="setSort('${col}')" style="${style}">${label}</div>`;
  }

  let h=`<div class="sk-table">
    <div class="sk-thead">
      <div class="sk-th"></div>
      <div class="sk-th"></div>
      <div class="sk-th" onclick="setSort('dmg')" style="text-align:left;cursor:pointer">SKILL</div>
      ${thSort('pct','SHARE')}
      ${thSort('dmg','DAMAGE')}
      ${thSort('dps','DPS')}
      ${thSort('avg','AVG HIT')}
      ${thSort('crit','CRIT %')}
      ${thSort('kills','KILLS')}
    </div>`;

  tree.forEach(({sk,sr,children,sortDmg,childDmg})=>{
    const cat=sr.ca||categSkill(sk);
    const col=catColor(cat);
    const icon=skIcon(sk,cat);
    const expanded=expandedSk.has(sk);
    const hasChildren=children.length>0;
    const critHi=sr.cr_r>0.5?' hi':'';
    // Share = aggregated damage / player total. Bar width MATCHES this share.
    const aggPct=p.total_damage?sortDmg/p.total_damage:0;
    const barW=Math.round(aggPct*100);
    const aggBadge=hasChildren?`<span class="sk-agg-badge">+${fmtN(childDmg)}</span>`:'';

    h+=`<div class="sk-row" onclick="toggleSk('${sk.replace(/'/g,"\'")}')">
      <div class="sk-exp has" onclick="event.stopPropagation();toggleSk('${sk.replace(/'/g,"\'")}')">
        ${expanded?'▾':'▸'}
      </div>
      <div class="sk-ic">${icon}</div>
      <div class="sk-name-cell">
        <div class="sk-disp">${dname(sk)}${aggBadge}</div>
        <div class="sk-sub">${affTag(sr.af)}<span class="sk-raw">${sk}</span></div>
      </div>
      <div class="sk-bar-cell"><div class="sk-bw">
        <div class="sk-bf" style="width:${barW}%;background:${col}"></div>
        <div class="sk-bpct">${fmtPct(aggPct)}</div>
      </div></div>
      <div class="sk-n">${fmtN(sortDmg)}</div>
      <div class="sk-n sm">${fightDur>0?fmtN(Math.round(sortDmg/fightDur)):'-'}</div>
      <div class="sk-n sm">${sr.av}</div>
      <div class="sk-n sm${critHi}">${fmtPct(sr.cr_r)}</div>
      <div class="sk-n sm">${sr.kl}</div>
    </div>`;

    // Expand detail panel — shown for every skill now
    if(expanded){
      const ownDps=fightDur>0?Math.round(sr.td/fightDur):0;
      h+=`<div class="sk-detail show">
        <div class="skg"><div class="skg-l">Own hits</div><div class="skg-v">${fmtN(sr.h)}</div></div>
        <div class="skg"><div class="skg-l">Own crits</div><div class="skg-v">${fmtN(sr.cr)}</div></div>
        <div class="skg"><div class="skg-l">Crit rate</div><div class="skg-v">${fmtPct(sr.cr_r)}</div></div>
        <div class="skg"><div class="skg-l">Own damage</div><div class="skg-v">${fmtN(sr.td)}</div></div>
        <div class="skg"><div class="skg-l">Own DPS</div><div class="skg-v">${fmtN(ownDps)}</div></div>
        <div class="skg"><div class="skg-l">Min hit</div><div class="skg-v">${fmtN(sr.mn||0)}</div></div>
        <div class="skg"><div class="skg-l">Max hit</div><div class="skg-v">${fmtN(sr.mx||0)}</div></div>
        <div class="skg"><div class="skg-l">Avg hit</div><div class="skg-v">${sr.av}</div></div>
        ${hasChildren?`<div class="skg"><div class="skg-l">Total (w/ children)</div><div class="skg-v">${fmtN(sortDmg)}</div></div>`:''}
        <div class="skg"><div class="skg-l">Category</div><div class="skg-v" style="font-size:11px">${cat}</div></div>
        <div class="sk-raw-full">${sk}</div>
      </div>`;
    }

    // Children — ALWAYS visible, indented below parent
    children.forEach(({sk:csk,sr:csr})=>{
      const cCat=csr.ca||categSkill(csk);
      const cCol=catColor(cCat);
      const cIcon=skIcon(csk,cCat);
      const cCritHi=csr.cr_r>0.5?' hi':'';
      const cPct=p.total_damage?csr.td/p.total_damage:0;
      const cBarW=Math.round(cPct*100);

      h+=`<div class="sk-row child">
        <div class="sk-exp"></div>
        <div class="sk-ic">${cIcon}</div>
        <div class="sk-name-cell">
          <div class="sk-disp"><span class="sk-connector">└─</span>${dname(csk)}</div>
          <div class="sk-sub">${affTag(csr.af)}<span class="sk-raw">${csk}</span></div>
        </div>
        <div class="sk-bar-cell"><div class="sk-bw">
          <div class="sk-bf" style="width:${cBarW}%;background:${cCol}"></div>
          <div class="sk-bpct">${fmtPct(cPct)}</div>
        </div></div>
        <div class="sk-n">${fmtN(csr.td)}</div>
        <div class="sk-n sm">${fightDur>0?fmtN(Math.round(csr.td/fightDur)):'-'}</div>
        <div class="sk-n sm">${csr.av}</div>
        <div class="sk-n sm${cCritHi}">${fmtPct(csr.cr_r)}</div>
        <div class="sk-n sm">${csr.kl}</div>
      </div>`;
    });
  });

  h+=`</div>`;
  return h;
}

// ── TIMELINE ─────────────────────────────────────────────────
function renderTimeline(f){
  const evts=f.all_events||[];
  if(!evts.length){
    return`<div class="tl-sec"><div class="sec-title">Event Timeline</div>
      <div class="tl-empty">No timeline data. Captured for your characters' fights only.</div></div>`;
  }
  const tgts=new Set(evts.map(e=>e.tl).filter(Boolean));
  const hasBoss=[...tgts].some(l=>l==='Boss*');

  let tabs=`<div class="tl-tabs">
    <button class="tl-tab${tlTarget==='all'?' act':''}" onclick="setTlTarget('all')">All (${evts.length})</button>`;
  if(hasBoss){const bc=evts.filter(e=>e.tl==='Boss*').length;tabs+=`<button class="tl-tab boss-t${tlTarget==='Boss*'?' act':''}" onclick="setTlTarget('Boss*')">👑 Boss* (${bc})</button>`;}
  [...tgts].filter(l=>l!=='Boss*').sort().forEach(lbl=>{
    const c=evts.filter(e=>e.tl===lbl).length;
    tabs+=`<button class="tl-tab${tlTarget===lbl?' act':''}" onclick="setTlTarget('${lbl}')">${lbl} (${c})</button>`;
  });
  tabs+=`</div>`;

  const filtered=tlTarget==='all'?evts:evts.filter(e=>e.tl===tlTarget);
  const shown=filtered.slice(0,200);

  let tbl=`<table class="tl-tbl">
    <thead><tr>
      <th style="width:48px">Time</th>
      <th style="width:80px">Source</th>
      <th>Skill</th>
      <th style="width:75px">Target</th>
      <th style="width:70px;text-align:right">Damage</th>
    </tr></thead><tbody>`;
  shown.forEach(ev=>{
    const yC=KNOWN_YOU.has(ev.source)?'you':'';
    const kM=ev.kill?'<span style="color:var(--red);margin-left:3px">✕</span>':'';
    tbl+=`<tr>
      <td class="tl-time">${ev.ts_s.toFixed(1)}s</td>
      <td class="tl-src ${yC}">${ev.source}</td>
      <td class="tl-sk">${dname(ev.skill)}${kM}</td>
      <td class="tl-tgt">${ev.tl||'?'}</td>
      <td class="tl-dmg${ev.crit?' crit':''}">${fmtN(ev.amount)}${ev.crit?' ★':''}</td>
    </tr>`;
  });
  tbl+=`</tbody></table>`;
  if(filtered.length>200)tbl+=`<div class="tl-more">Showing 200 of ${filtered.length} events</div>`;

  return`<div class="tl-sec"><div class="sec-title">Event Timeline</div>${tabs}${tbl}</div>`;
}

// ── COMPARATOR ────────────────────────────────────────────────
function renderCmp(allF,curF){
  let h=`<div class="cmp-box">
    <div class="cmp-hdr" onclick="toggleCmp()">
      <span class="cmp-title">⚖️ Compare Fights</span>
      <span class="cmp-toggle" id="cmpTgl">▸</span>
    </div>
    <div class="cmp-body" id="cmpBdy">
      <div class="cmp-picks">
        <div class="cmp-pick"><label>Fight Alpha</label>
          <select id="cmpA">
            <option value="">— select —</option>`;
  allF.forEach(f=>{
    h+=`<option value="${f.global_id}">#${f.global_id} — ${fmtDur(f.duration_s)} — ${fmtN(f.total_damage_all_players)} dmg${f.is_boss?' 👑':''}</option>`;
  });
  h+=`</select></div>
        <div class="cmp-pick"><label>Fight Beta</label>
          <select id="cmpB">
            <option value="">— select —</option>`;
  allF.forEach(f=>{
    h+=`<option value="${f.global_id}">#${f.global_id} — ${fmtDur(f.duration_s)} — ${fmtN(f.total_damage_all_players)} dmg${f.is_boss?' 👑':''}</option>`;
  });
  h+=`</select></div>
      </div>
      <button class="cmp-run-btn" onclick="runCmp()">Compare Fight Performance</button>
      <div class="cmp-result" id="cmpRes"></div>
    </div>
  </div>`;
  return h;
}
function toggleCmp(){
  const b=document.getElementById('cmpBdy'),t=document.getElementById('cmpTgl');
  if(!b||!t)return;
  const o=b.classList.toggle('open');t.classList.toggle('open',o);t.textContent=o?'▾':'▸';
}
function runCmp(){
  const aId=document.getElementById('cmpA')?.value;
  const bId=document.getElementById('cmpB')?.value;
  const res=document.getElementById('cmpRes');
  if(!aId||!bId){if(res)res.innerHTML='<div style="color:var(--text3);font-size:13px;padding:6px 0">Select two fights.</div>';return;}
  const allF=allSessions.flatMap(s=>s.fights);
  const fa=allF.find(f=>f.global_id==aId),fb=allF.find(f=>f.global_id==bId);
  if(!fa||!fb)return;
  const getYou=f=>{const yp=Object.values(f.players).find(p=>KNOWN_YOU.has(p.name));return yp||Object.values(f.players)[0];};
  const pa=getYou(fa),pb=getYou(fb);

  function cmpVal(va,vb,higherBetter=true){
    const an=parseFloat(String(va).replace(/[^0-9.-]/g,''));
    const bn=parseFloat(String(vb).replace(/[^0-9.-]/g,''));
    const aW=higherBetter?an>bn:an<bn;const bW=higherBetter?bn>an:bn<an;
    return[
      `<td class="cmp-${aW?'better':bW?'worse':'same'}">${va}</td>`,
      `<td class="cmp-${bW?'better':aW?'worse':'same'}">${vb}</td>`
    ];
  }

  const rows=[
    ['Duration',fmtDur(fa.duration_s),fmtDur(fb.duration_s),false],
    ['DPS',fmtN(pa.dps),fmtN(pb.dps)],
    ['Total Damage',fmtN(pa.total_damage),fmtN(pb.total_damage)],
    ['Crit Rate',fmtPct(pa.crit_rate),fmtPct(pb.crit_rate)],
    ['Kills',pa.kill_count,pb.kill_count],
    ['Leech',fmtN(pa.leech.total),fmtN(pb.leech.total)],
    ['Hits',fmtN(pa.hit_count),fmtN(pb.hit_count)],
  ];

  // Top skills
  const topA=Object.entries(pa.skills||{}).sort((a,b)=>b[1].td-a[1].td).slice(0,4);
  const topB=Object.entries(pb.skills||{}).sort((a,b)=>b[1].td-a[1].td).slice(0,4);

  let t=`<table class="cmp-table"><thead><tr>
    <th></th>
    <th class="cmp-a-hdr">#${fa.global_id} Alpha<br><span style="font-size:10px;opacity:.6">${fmtDur(fa.duration_s)}</span></th>
    <th class="cmp-b-hdr">#${fb.global_id} Beta<br><span style="font-size:10px;opacity:.6">${fmtDur(fb.duration_s)}</span></th>
  </tr></thead><tbody>
  <tr class="cmp-section-hdr"><td colspan="3">Core Metrics</td></tr>`;

  rows.forEach(([lbl,va,vb,hb=true])=>{
    const[ca,cb]=cmpVal(va,vb,hb);
    t+=`<tr><td>${lbl}</td>${ca}${cb}</tr>`;
  });

  if(topA.length||topB.length){
    t+=`<tr class="cmp-section-hdr"><td colspan="3">Top Skills</td></tr>`;
    const maxLen=Math.max(topA.length,topB.length);
    for(let i=0;i<maxLen;i++){
      const sa=topA[i],sb=topB[i];
      const[ca,cb]=cmpVal(sa?fmtN(sa[1].td):'—',sb?fmtN(sb[1].td):'—');
      t+=`<tr>
        <td style="font-size:10px">#${i+1}</td>
        <td class="${sa?'cmp-same':'cmp-worse'}" style="font-size:11px">${sa?`${dname(sa[0])} (${fmtN(sa[1].td)})`:' — '}</td>
        <td class="${sb?'cmp-same':'cmp-worse'}" style="font-size:11px">${sb?`${dname(sb[0])} (${fmtN(sb[1].td)})`:' — '}</td>
      </tr>`;
    }
  }

  t+=`</tbody></table>`;
  if(res){res.innerHTML=t;res.classList.add('show');}
}

// ── BOOT ─────────────────────────────────────────────────────
function boot(){updateBadges();buildPlrBtns();renderSB();}
boot();
</script>
