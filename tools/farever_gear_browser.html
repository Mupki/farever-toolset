<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Farever Gear Browser</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap');
  :root{
    --parch:#f4ead6; --parch2:#ece0c6; --ink:#3a2c1c; --ink2:#6b5640;
    --crimson:#b5462f; --crimson2:#9c3a26; --gold:#c79a3b; --line:#d8c39c;
    --panel:#fbf4e3;
    --r-common:#8a7d68; --r-uncommon:#3f9a5a; --r-rare:#3d7fc4; --r-epic:#8a5cc4; --r-legendary:#d08a2b;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:#2a2018;font-family:'Spectral',Georgia,serif;color:var(--ink);
    background-image:radial-gradient(circle at 50% 0,#3a2c1e,#241b13);min-height:100vh;}
  .wrap{max-width:1180px;margin:0 auto;padding:0 16px 60px;}
  header{padding:26px 0 18px;text-align:center;}
  header h1{font-family:'Cinzel',serif;color:var(--parch);font-size:30px;letter-spacing:1px;margin:0;
    text-shadow:0 2px 0 #1a130c;}
  header p{color:#cbb89c;font-size:14px;margin:6px 0 0;font-style:italic;}
  .board{background:var(--parch);border:2px solid var(--gold);border-radius:10px;
    box-shadow:0 14px 40px rgba(0,0,0,.5),inset 0 0 0 4px var(--parch2);overflow:hidden;}
  .topbar{background:linear-gradient(180deg,var(--crimson),var(--crimson2));padding:14px 18px;
    display:flex;gap:12px;align-items:center;flex-wrap:wrap;border-bottom:3px solid var(--gold);}
  .topbar input,.topbar select{font-family:'Spectral',serif;font-size:14px;padding:8px 12px;
    border:1px solid #00000022;border-radius:6px;background:var(--panel);color:var(--ink);}
  .topbar input{flex:1;min-width:180px;}
  .topbar .lbl{color:#fbeede;font-family:'Cinzel',serif;font-size:13px;letter-spacing:.5px;}
  .body{display:grid;grid-template-columns:200px 1fr 320px;min-height:560px;}
  .slots{background:var(--parch2);border-right:1px solid var(--line);padding:10px 8px;overflow:auto;max-height:640px;}
  .slotgrp{font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;color:var(--ink2);
    text-transform:uppercase;margin:12px 8px 4px;}
  .slot{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:6px;
    cursor:pointer;font-size:14px;color:var(--ink);}
  .slot:hover{background:#ffffff66;}
  .slot.active{background:var(--crimson);color:#fff;}
  .slot .n{font-size:11px;opacity:.7;}
  .slot.active .n{opacity:.85;}
  .list{padding:10px 6px;overflow:auto;max-height:640px;}
  .item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:7px;cursor:pointer;
    border:1px solid transparent;}
  .item:hover{background:#fff8;border-color:var(--line);}
  .item.sel{background:#fff;border-color:var(--gold);}
  .dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .item .nm{flex:1;font-size:14.5px;}
  .item .lv{font-size:12px;color:var(--ink2);}
  .detail{background:var(--panel);border-left:1px solid var(--line);padding:18px;overflow:auto;max-height:640px;}
  .empty{color:var(--ink2);font-style:italic;text-align:center;padding:40px 10px;font-size:14px;}
  .dtitle{font-family:'Cinzel',serif;font-size:19px;line-height:1.25;margin:0 0 2px;}
  .dsub{font-size:13px;color:var(--ink2);margin-bottom:12px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .chip{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--parch2);color:var(--ink2);
    border:1px solid var(--line);}
  .sec{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.8px;color:var(--crimson2);
    text-transform:uppercase;border-bottom:1px solid var(--line);padding-bottom:4px;margin:16px 0 8px;}
  .skill{margin-bottom:6px;font-size:13.5px;}
  .skill b{font-weight:600;}
  .drop{font-size:13.5px;margin:4px 0;display:flex;justify-content:space-between;}
  .drop .p{color:var(--crimson2);font-weight:600;}
  .pending{font-size:13px;font-style:italic;color:var(--ink2);background:#0000000a;padding:10px 12px;
    border-radius:6px;border-left:3px solid var(--gold);}
  .count{padding:8px 16px;font-size:12px;color:var(--ink2);background:var(--parch2);border-top:1px solid var(--line);}
  @media(max-width:880px){.body{grid-template-columns:1fr;}.slots,.list,.detail{max-height:none;border:none;border-bottom:1px solid var(--line);}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Farever Gear Compendium</h1>
    <p>Browse every item by slot &middot; sourced from game data</p>
  </header>
  <div class="board">
    <div class="topbar">
      <input id="q" type="text" placeholder="Search items..."/>
      <span class="lbl">Rarity</span>
      <select id="rar">
        <option value="">All</option>
        <option>Legendary</option><option>Epic</option><option>Rare</option>
        <option>Uncommon</option><option>Common</option>
      </select>
      <span class="lbl">Class affinity</span>
      <select id="aff"><option value="">All</option></select>
    </div>
    <div class="body">
      <div class="slots" id="slots"></div>
      <div class="list" id="list"></div>
      <div class="detail" id="detail"></div>
    </div>
    <div class="count" id="count"></div>
  </div>
</div>

const RAR={Common:'var(--r-common)',Uncommon:'var(--r-uncommon)',Rare:'var(--r-rare)',Epic:'var(--r-epic)',Legendary:'var(--r-legendary)'};
const rc=r=>RAR[r]||'var(--r-common)';
const SLOT_ORDER=[['Weapons',['Weapon']],['Armor',['Head','Shoulders','Chest','Hands','Waist','Legs','Feet','Back']],['Accessories',['Necklace','Ring','Trinket','Glider']]];
const RANK={Legendary:5,Epic:4,Rare:3,Uncommon:2,Common:1};
let curSlot='Head', sel=null;

const slotsEl=document.getElementById('slots'),listEl=document.getElementById('list'),
  detEl=document.getElementById('detail'),qEl=document.getElementById('q'),
  rarEl=document.getElementById('rar'),affEl=document.getElementById('aff'),cntEl=document.getElementById('count');

const affs=[...new Set(ITEMS.map(i=>i.affinity).filter(Boolean))].sort();
affs.forEach(a=>{const o=document.createElement('option');o.textContent=a;affEl.appendChild(o);});

function counts(){const c={};ITEMS.forEach(i=>c[i.slot]=(c[i.slot]||0)+1);return c;}
function buildSlots(){
  const c=counts();slotsEl.innerHTML='';
  SLOT_ORDER.forEach(([grp,slots])=>{
    const h=document.createElement('div');h.className='slotgrp';h.textContent=grp;slotsEl.appendChild(h);
    slots.forEach(s=>{
      const d=document.createElement('div');d.className='slot'+(s===curSlot?' active':'');
      d.innerHTML='<span>'+s+'</span><span class="n">'+(c[s]||0)+'</span>';
      d.onclick=()=>{curSlot=s;sel=null;buildSlots();render();};
      slotsEl.appendChild(d);
    });
  });
}
function filtered(){
  const q=qEl.value.trim().toLowerCase(),rf=rarEl.value,af=affEl.value;
  return ITEMS.filter(i=>i.slot===curSlot)
    .filter(i=>!rf||i.rarity===rf).filter(i=>!af||i.affinity===af)
    .filter(i=>!q||i.name.toLowerCase().includes(q))
    .sort((a,b)=>(RANK[b.rarity]||0)-(RANK[a.rarity]||0)||(a.level||99)-(b.level||99)||a.name.localeCompare(b.name));
}
function render(){
  const items=filtered();listEl.innerHTML='';
  if(!items.length){listEl.innerHTML='<div class="empty">No items match.</div>';}
  items.forEach(it=>{
    const row=document.createElement('div');row.className='item'+(sel===it?' sel':'');
    row.innerHTML='<span class="dot" style="background:'+rc(it.rarity)+'"></span>'+
      '<span class="nm" style="color:'+rc(it.rarity)+'">'+it.name+'</span>'+
      '<span class="lv">'+(it.level!=null?'Lv '+it.level:'')+'</span>';
    row.onclick=()=>{sel=it;render();detail(it);};
    listEl.appendChild(row);
  });
  const total=ITEMS.filter(i=>i.slot===curSlot).length;
  cntEl.textContent=items.length+' of '+total+' '+curSlot.toLowerCase()+' item'+(total!==1?'s':'')+' shown';
  if(sel&&!items.includes(sel)){sel=null;detail(null);}
}
function detail(it){
  if(!it){detEl.innerHTML='<div class="empty">Select an item to view details</div>';return;}
  let h='<div class="dtitle" style="color:'+rc(it.rarity)+'">'+it.name+'</div>';
  h+='<div class="dsub">'+[it.rarity,it.type.replace(/([a-z])([A-Z])/g,'$1 $2')].filter(Boolean).join(' \u00b7 ')+'</div>';
  h+='<div class="chips">';
  if(it.level!=null)h+='<span class="chip">Item level '+it.level+'</span>';
  if(it.affinity)h+='<span class="chip">'+it.affinity+'</span>';
  if(it.faction)h+='<span class="chip">'+it.faction+'</span>';
  h+='</div>';
  if(it.skills&&it.skills.length){
    h+='<div class="sec">Grants</div>';
    it.skills.forEach(s=>h+='<div class="skill"><b>'+s+'</b></div>');
  }
  h+='<div class="sec">Source</div>';
  if(it.wiki&&it.wiki.length){
    const byDun={};
    it.wiki.forEach(w=>{(byDun[w.src]=byDun[w.src]||[]).push((w.cls||'')+(w.diff?' ('+w.diff+')':''));});
    Object.keys(byDun).forEach(src=>{
      h+='<div class="drop"><span>'+src+'</span><span class="p" style="font-size:11px;color:var(--ink2);font-weight:400">'+[...new Set(byDun[src])].join(', ')+'</span></div>';
    });
  }
  if(it.drops&&it.drops.length){
    it.drops.forEach(d=>{h+='<div class="drop"><span>'+d.src+'</span><span class="p">'+
      (d.p>=0.01?Math.round(d.p*100)+'%':(d.p*100).toFixed(1)+'%')+'</span></div>';});
  }
  if((!it.drops||!it.drops.length)&&(!it.wiki||!it.wiki.length)){
    const arm=['Head','Shoulders','Chest','Hands','Waist','Legs','Feet','Back'].includes(it.slot);
    h+='<div class="pending">'+(arm?
      'Armor drops from one-time activity &amp; event chests. That data isn\'t in the current game files yet (events not live) \u2014 it will populate automatically when the next update ships.':
      'No monster drop source recorded \u2014 likely from crafting, a vendor, or an event chest not yet in the game data.')+'</div>';
  }
  detEl.innerHTML=h;
}
qEl.oninput=render;rarEl.onchange=render;affEl.onchange=render;
buildSlots();render();detail(null);
</script>
